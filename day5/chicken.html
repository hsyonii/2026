<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
</head>
<body>
    <h1>
        <img src="./치킨.jpg"/>
        <br />
        치킨에 관한 설문조사
    </h1>
    <h3>
         이름: 
         <input type="text">
    </h3>
    <h3>
        Q1.평소 치킨을 많이 드시나요?
     </h3>
        <input type="radio" name="선택"/> 많이
        <input type="radio" name="선택"/> 별로
        <input type="radio" name="선택"/> 싫어
    
        <br />
     <h3>
        Q2.어떤 브랜드의 치킨을 선호하시나요?
    </h3>
        <input type="checkbox" name="선택"/> BHC
        <input type="checkbox" name="선택"/> BBQ
        <input type="checkbox" name="선택"/> KFC
        <input type="checkbox" name="선택"/> 교촌
        <input type="checkbox" name="선택"/> 페리카나
        <input type="checkbox" name="선택"/> 네네
        
    <h3>
        Q3. 치킨을 먹을 때 더 선호하는 음료를 선택해주세요.
    </h3>
    <input type="radio" name="drink"/> 탄산음료
    <input type="radio" name="drink"/> 주류(맥주,소주 등)
    <input type="radio" name="drink"/> 기타
    <input type="text" placeholder="직접입력"/>
    <h3>
        Q4. 치킨보다 피자를 선호하시나요?
    </h3>
    <input type="radio" name="drink"/> 네
    <input type="radio" name="drink"/> 아니요
    <input type="radio" name="drink"/> 못고르겠음
    <h3>
        Q4. 평소에 치킨을 얼마나 드시는지 선택해주세요!
    </h3>
    <input type="radio" name="drink"/> 일년에 한번 이상
    <input type="radio" name="drink"/> 분기별 한번 이상
    <input type="radio" name="drink"/> 한달에 한번 이상
    <input type="radio" name="drink"/> 일주일에 한번 이상
    <h3>
        치킨에 대한 생각을 자유롭게 적어주세요.
    </h3>
    
    <textarea cols="80" rows="15" placeholder="게시물 내용 입력"></textarea>
</body>
</html>
